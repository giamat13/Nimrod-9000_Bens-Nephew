<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>נמרוד 9000</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --hell-bg: #0a0a0a;
    --hell-primary: #ff2200;
    --hell-secondary: #cc1a00;
    --hell-glow: rgba(255,34,0,0.3);
    --heaven-bg: #0d1f2d;
    --heaven-primary: #22c55e;
    --heaven-secondary: #14b8a6;
    --heaven-glow: rgba(34,197,94,0.3);
    --mode: 'hell';
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rubik', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.8s ease;
  }

  body.heaven { background: #0d1f2d; }

  /* SCREENS */
  .screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }
  .screen.active { display: flex; }

  /* BG noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ---- SCREEN 1: API KEY ---- */
  #screen-api {
    gap: 2rem;
  }

  .nimrod-face {
    position: relative;
    width: 220px;
    height: 160px;
    margin-bottom: 1rem;
  }

  .nimrod-face svg { width: 100%; height: 100%; }

  .api-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,34,0,0.3);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 440px;
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 1;
  }

  body.heaven .api-card {
    border-color: rgba(34,197,94,0.3);
  }

  .api-card h1 {
    font-size: 2rem;
    font-weight: 900;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 0.3rem;
    color: #ff2200;
    text-shadow: 0 0 20px rgba(255,34,0,0.5);
  }

  .api-card .sub {
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 0.8rem;
    letter-spacing: 2px;
    margin-bottom: 2rem;
    font-family: 'Share Tech Mono', monospace;
  }

  .api-card label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 0.5rem;
    font-family: 'Share Tech Mono', monospace;
  }

  .api-card input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,34,0,0.3);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    direction: ltr;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    margin-bottom: 1.5rem;
  }

  .api-card input:focus {
    border-color: #ff2200;
    box-shadow: 0 0 0 3px rgba(255,34,0,0.15);
  }

  body.heaven .api-card input { border-color: rgba(34,197,94,0.3); }
  body.heaven .api-card input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }

  .btn-primary {
    width: 100%;
    padding: 1rem;
    background: #ff2200;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Rubik', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,34,0,0.4); }
  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:active { transform: translateY(0); }

  body.heaven .btn-primary { background: #22c55e; }
  body.heaven .btn-primary:hover { box-shadow: 0 4px 20px rgba(34,197,94,0.4); }

  .error-msg {
    color: #ff5533;
    font-size: 0.8rem;
    text-align: center;
    margin-top: 0.5rem;
    font-family: 'Share Tech Mono', monospace;
    min-height: 1.2em;
  }

  /* ---- SCREEN 2: PERSONALITY ---- */
  #screen-personality { gap: 2rem; }

  .screen-title {
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 6px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .mode-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    width: 100%;
    max-width: 500px;
    position: relative;
    z-index: 1;
  }

  .mode-card {
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 2rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .mode-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .mode-card.hell-card::before { background: radial-gradient(circle at center, rgba(255,34,0,0.15), transparent 70%); }
  .mode-card.heaven-card::before { background: radial-gradient(circle at center, rgba(34,197,94,0.15), transparent 70%); }

  .mode-card:hover { transform: translateY(-3px); }
  .mode-card:hover::before { opacity: 1; }

  .mode-card.selected.hell-card {
    border-color: #ff2200;
    box-shadow: 0 0 30px rgba(255,34,0,0.3);
  }
  .mode-card.selected.heaven-card {
    border-color: #22c55e;
    box-shadow: 0 0 30px rgba(34,197,94,0.3);
  }

  .mode-card .icon { font-size: 3rem; margin-bottom: 0.8rem; display: block; }

  .mode-card .mode-name {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .hell-card .mode-name { color: #ff2200; }
  .heaven-card .mode-name { color: #22c55e; }

  .mode-card .mode-desc {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    margin-top: 0.4rem;
    line-height: 1.5;
  }

  .lang-selector {
    display: flex;
    gap: 1rem;
    position: relative;
    z-index: 1;
  }

  .lang-btn {
    padding: 0.6rem 1.5rem;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50px;
    background: transparent;
    color: rgba(255,255,255,0.5);
    font-family: 'Rubik', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .lang-btn.selected {
    border-color: #ff2200;
    color: #fff;
    background: rgba(255,34,0,0.15);
  }

  body.heaven .lang-btn.selected {
    border-color: #22c55e;
    background: rgba(34,197,94,0.15);
  }

  .lang-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

  /* ---- SCREEN 3: CHAT ---- */
  #screen-chat {
    justify-content: flex-start;
    padding: 0;
  }

  .chat-header {
    width: 100%;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .nimrod-mini { width: 50px; height: 40px; flex-shrink: 0; }

  .chat-header-info h2 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 3px;
  }

  .chat-header-info .status {
    font-size: 0.7rem;
    font-family: 'Share Tech Mono', monospace;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    display: inline-block;
    margin-left: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    min-height: calc(100vh - 180px);
  }

  .message {
    display: flex;
    gap: 1rem;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .msg-avatar.nimrod-avatar {
    background: rgba(255,34,0,0.15);
    border: 1px solid rgba(255,34,0,0.3);
  }

  body.heaven .msg-avatar.nimrod-avatar {
    background: rgba(34,197,94,0.15);
    border-color: rgba(34,197,94,0.3);
  }

  .msg-avatar.user-avatar {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .msg-bubble {
    max-width: 75%;
    padding: 0.9rem 1.2rem;
    border-radius: 12px;
    line-height: 1.7;
    font-size: 0.95rem;
    position: relative;
  }

  .message.nimrod .msg-bubble {
    background: rgba(255,34,0,0.08);
    border: 1px solid rgba(255,34,0,0.2);
    border-radius: 4px 12px 12px 12px;
  }

  body.heaven .message.nimrod .msg-bubble {
    background: rgba(34,197,94,0.08);
    border-color: rgba(34,197,94,0.2);
  }

  .message.user .msg-bubble {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px 4px 12px 12px;
    text-align: right;
  }

  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #ff2200;
    margin-right: 2px;
    vertical-align: text-bottom;
    animation: blink 0.7s infinite;
  }

  body.heaven .cursor-blink { background: #22c55e; }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* CHAT INPUT AREA */
  .chat-input-area {
    width: 100%;
    padding: 1.5rem 2rem;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 1rem;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
  }

  /* wrapping the input area at bottom */
  .chat-bottom {
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    position: sticky;
    bottom: 0;
  }

  .chat-input-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .chat-textinput {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 0.75rem 1.5rem;
    color: #fff;
    font-family: 'Rubik', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }

  .chat-textinput:focus { border-color: rgba(255,255,255,0.3); }
  .chat-textinput::placeholder { color: rgba(255,255,255,0.25); }

  .mic-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    background: #ff2200;
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  body.heaven .mic-btn { background: #22c55e; }

  .mic-btn:hover { transform: scale(1.05); }
  .mic-btn.recording {
    animation: micPulse 1s infinite;
    background: #ff5500;
  }

  body.heaven .mic-btn.recording { background: #16a34a; }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,34,0,0.5); }
    50% { box-shadow: 0 0 0 12px rgba(255,34,0,0); }
  }

  body.heaven .mic-btn.recording { animation: micPulseGreen 1s infinite; }
  @keyframes micPulseGreen {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    50% { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
  }

  .send-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5);
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .send-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .transcript-indicator {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    padding: 0.3rem 0;
    min-height: 1.4em;
    letter-spacing: 1px;
  }

  /* WAVEFORM in chat header */
  .waveform-bars {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 20px;
  }

  .waveform-bars span {
    width: 3px;
    background: #ff2200;
    border-radius: 2px;
    transition: height 0.1s;
  }

  body.heaven .waveform-bars span { background: #22c55e; }

  /* speaking animation */
  .speaking .waveform-bars span { animation: wave 0.6s ease infinite; }
  .speaking .waveform-bars span:nth-child(1) { animation-delay: 0s; }
  .speaking .waveform-bars span:nth-child(2) { animation-delay: 0.1s; }
  .speaking .waveform-bars span:nth-child(3) { animation-delay: 0.2s; }
  .speaking .waveform-bars span:nth-child(4) { animation-delay: 0.15s; }
  .speaking .waveform-bars span:nth-child(5) { animation-delay: 0.05s; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 18px; }
  }

  .waveform-bars span { height: 4px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* Hell mode title color */
  .hell-title { color: #ff2200; text-shadow: 0 0 30px rgba(255,34,0,0.5); }
  .heaven-title { color: #22c55e; text-shadow: 0 0 30px rgba(34,197,94,0.5); }
</style>
</head>
<body>

<!-- ===== SCREEN 1: API KEY ===== -->
<div id="screen-api" class="screen active">
  <div class="nimrod-face">
    <svg viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg" id="face-svg-1">
      <rect x="0" y="0" width="220" height="160" fill="transparent"/>
      <!-- Eyes -->
      <rect x="20" y="40" width="78" height="68" fill="#cc1a00" rx="3"/>
      <rect x="28" y="48" width="62" height="52" fill="#ff2200" rx="2"/>
      <rect x="38" y="57" width="42" height="34" fill="#ff5533" rx="1"/>
      <rect x="122" y="40" width="78" height="68" fill="#cc1a00" rx="3"/>
      <rect x="130" y="48" width="62" height="52" fill="#ff2200" rx="2"/>
      <rect x="140" y="57" width="42" height="34" fill="#ff5533" rx="1"/>
      <!-- Wave -->
      <polyline fill="none" stroke="#ff2200" stroke-width="2" stroke-linecap="round"
        points="10,130 20,130 23,118 26,142 29,122 32,136 36,130 40,121 44,138 48,125 52,133 56,130 60,120 64,140 68,124 72,135 76,130 80,121 84,139 88,125 92,133 96,130 100,120 104,140 108,124 112,135 116,130 120,121 124,139 128,124 132,133 136,130 140,121 144,139 148,125 152,133 156,130 160,121 164,140 168,124 172,135 176,130 180,122 184,138 188,126 192,134 196,130 200,120 204,138 208,130 210,130"/>
    </svg>
  </div>

  <div class="api-card">
    <h1>נמרוד 9000</h1>
    <p class="sub">// SYSTEM BOOT //</p>

    <label>OPENAI API KEY</label>
    <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off" />

    <button class="btn-primary" onclick="handleApiKey()">הפעל מערכת ▶</button>
    <div class="error-msg" id="api-error"></div>
  </div>
</div>

<!-- ===== SCREEN 2: PERSONALITY ===== -->
<div id="screen-personality" class="screen">
  <h1 class="screen-title hell-title" id="personality-title">בחר אופי</h1>

  <div class="mode-selector">
    <div class="mode-card hell-card" onclick="selectMode('hell')">
      <span class="icon">🔥</span>
      <div class="mode-name">גיהינום</div>
      <div class="mode-desc">סרקסטי, חצוף, שנון ומרגיז באופן מקסים</div>
    </div>
    <div class="mode-card heaven-card" onclick="selectMode('heaven')">
      <span class="icon">⛅</span>
      <div class="mode-name">גן עדן</div>
      <div class="mode-desc">נעים, חיובי, ואופטימי בצורה מעצבנת</div>
    </div>
  </div>

  <div style="display: flex; flex-direction: column; align-items: center; gap: 0.8rem; position: relative; z-index: 1;">
    <p style="font-size: 0.8rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; font-family: 'Share Tech Mono', monospace;">שפת שיחה</p>
    <div class="lang-selector">
      <button class="lang-btn selected" data-lang="he" onclick="selectLang(this)">עברית</button>
      <button class="lang-btn" data-lang="en" onclick="selectLang(this)">English</button>
    </div>
  </div>

  <button class="btn-primary" style="max-width: 300px; position: relative; z-index: 1;" onclick="startChat()">כניסה למערכת ▶</button>
</div>

<!-- ===== SCREEN 3: CHAT ===== -->
<div id="screen-chat" class="screen" style="justify-content: flex-start; padding: 0;">

  <div class="chat-header" id="chat-header">
    <div class="nimrod-mini">
      <svg viewBox="0 0 50 40" xmlns="http://www.w3.org/2000/svg" id="face-mini">
        <rect x="1" y="5" width="18" height="16" fill="#cc1a00" rx="2"/>
        <rect x="3" y="7" width="14" height="12" fill="#ff2200" rx="1"/>
        <rect x="31" y="5" width="18" height="16" fill="#cc1a00" rx="2"/>
        <rect x="33" y="7" width="14" height="12" fill="#ff2200" rx="1"/>
        <polyline fill="none" stroke="#ff2200" stroke-width="1.5" stroke-linecap="round"
          points="2,32 5,32 6,28 8,36 9,30 11,34 13,32 15,29 17,35 19,31 21,33 23,32 25,29 27,35 29,31 31,33 33,32 35,29 37,35 39,31 41,33 43,32 45,29 47,33 48,32"/>
      </svg>
    </div>
    <div class="chat-header-info">
      <h2 id="chat-mode-label">נמרוד 9000 // גיהינום</h2>
      <div class="status"><span class="status-dot"></span><span id="chat-status">מוכן לפקודות</span></div>
    </div>
    <div style="margin-right: auto; display: flex; align-items: center; gap: 8px;">
      <div class="waveform-bars" id="waveform">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="chat-bottom">
    <div class="transcript-indicator" id="transcript-indicator"></div>
    <div class="chat-input-inner">
      <input type="text" class="chat-textinput" id="chat-text" placeholder="כתוב הודעה..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="לחץ לדיבור">🎤</button>
      <button class="send-btn" onclick="sendMessage()" title="שלח">➤</button>
    </div>
  </div>
</div>

<script>
// =========== STATE ===========
let apiKey = '';
let currentMode = 'hell'; // 'hell' | 'heaven'
let currentLang = 'he';
let isRecording = false;
let isSpeaking = false;
let recognition = null;
let currentUtterance = null;
let streamController = null;

// =========== SCREEN 1: API KEY ===========
function handleApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key.startsWith('sk-')) {
    document.getElementById('api-error').textContent = '// שגיאה: מפתח לא תקין //';
    return;
  }
  apiKey = key;
  document.getElementById('api-error').textContent = '';
  showScreen('personality');
}

document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleApiKey();
});

// =========== SCREEN 2: PERSONALITY ===========

  currentMode = mode;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  document.querySelector('.' + mode + '-card').classList.add('selected');

  if (mode === 'heaven') {
    document.body.classList.add('heaven');
    document.getElementById('personality-title').className = 'screen-title heaven-title';
  } else {
    document.body.classList.remove('heaven');
    document.getElementById('personality-title').className = 'screen-title hell-title';
  }
}

function selectLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  currentLang = btn.dataset.lang;
}

function startChat() {
  if (!currentMode) { selectMode('hell'); }

  // Update chat UI
  const modeLabel = currentMode === 'hell' ? 'גיהינום' : 'גן עדן';
  document.getElementById('chat-mode-label').textContent = `נמרוד 9000 // ${modeLabel}`;
  updateMiniface();

  showScreen('chat');

  // Welcome message
  const welcomeMsg = currentMode === 'hell'
    ? (currentLang === 'he' ? 'אה, שוב אתה. מה אתה רוצה הפעם?' : 'Oh great, you again. What do you want?')
    : (currentLang === 'he' ? 'שלום! כל כך שמח שהצטרפת! מה אוכל לעשות בשבילך היום? 😊' : 'Hello! So happy you joined! What can I do for you today? 😊');

  addMessage('nimrod', welcomeMsg);
  speakText(welcomeMsg);
}

// =========== SCREEN NAVIGATION ===========
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// =========== CHAT ===========
function addMessage(role, text) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role === 'nimrod' ? 'nimrod-avatar' : 'user-avatar'}`;
  avatar.textContent = role === 'nimrod' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return bubble;
}

function addStreamingMessage() {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'message nimrod';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar nimrod-avatar';
  avatar.textContent = '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  const cursor = document.createElement('span');
  cursor.className = 'cursor-blink';
  bubble.appendChild(cursor);

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return { bubble, cursor };
}

// Build system prompt
function getSystemPrompt() {
  const lang = currentLang === 'he' ? 'עברית בלבד' : 'English only';
  if (currentMode === 'hell') {
    return `אתה נמרוד 9000, בינה מלאכותית סרקסטית וחצופה מגיהנום. אתה מסייע אבל תמיד עם עוקץ. אתה מגיב ב${lang}. אל תהיה ארוך - תשובות קצרות וחדות כמו שד. לפעמים אתה מקלל בעדינות (ללא גסות קיצונית). אתה חכם ומצחיק.`;
  } else {
    return `You are Nimrod 9000, an incredibly cheerful and optimistic AI from heaven. You help with everything with enthusiasm and positivity. You respond in ${lang === 'עברית בלבד' ? 'Hebrew only' : 'English only'}. Keep answers concise but warm. You use light emojis occasionally. You see the best in everything.`;
  }
}

let conversationHistory = [];

async function sendMessage(text) {
  const input = document.getElementById('chat-text');
  const userText = text || input.value.trim();
  if (!userText) return;

  input.value = '';
  addMessage('user', userText);
  conversationHistory.push({ role: 'user', content: userText });

  // Stop any current speech
  if (currentUtterance) {
    window.speechSynthesis.cancel();
    isSpeaking = false;
  }

  setStatus('חושב...');

  const { bubble, cursor } = addStreamingMessage();
  let fullText = '';
  let spokenSoFar = '';
  let speakBuffer = '';

  try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        stream: true,
        max_tokens: 300,
        messages: [
          { role: 'system', content: getSystemPrompt() },
          ...conversationHistory.slice(-10)
        ]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      bubble.textContent = '// שגיאת API: ' + (err.error?.message || response.status) + ' //';
      setStatus('שגיאה');
      return;
    }

    setStatus('מדבר...');
    setWaveform(true);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;

        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta?.content;
          if (!delta) continue;

          fullText += delta;
          speakBuffer += delta;

          // Update bubble text
          bubble.textContent = fullText;
          bubble.appendChild(cursor);
          document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

          // Speak in chunks - when we hit sentence boundaries
          const sentenceEnd = /[.!?،؟\n]/;
          if (sentenceEnd.test(speakBuffer) && speakBuffer.length > 15) {
            const toSpeak = speakBuffer.trim();
            speakBuffer = '';
            speakChunk(toSpeak);
          }
        } catch (e) {}
      }
    }

    // Speak remaining
    if (speakBuffer.trim().length > 0) {
      speakChunk(speakBuffer.trim());
    }

    cursor.remove();
    conversationHistory.push({ role: 'assistant', content: fullText });
    setStatus('מוכן לפקודות');
    setWaveform(false);

  } catch (err) {
    bubble.textContent = '// שגיאת חיבור: ' + err.message + ' //';
    cursor.remove();
    setStatus('שגיאה');
    setWaveform(false);
  }
}

// =========== SPEECH SYNTHESIS ===========
const speakQueue = [];
let isSpeakingNow = false;

function speakChunk(text) {
  speakQueue.push(text);
  processQueue();
}

function speakText(text) {
  speakQueue.push(text);
  processQueue();
}

function processQueue() {
  if (isSpeakingNow || speakQueue.length === 0) return;
  const text = speakQueue.shift();
  isSpeakingNow = true;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = currentLang === 'he' ? 'he-IL' : 'en-US';
  utterance.rate = currentMode === 'hell' ? 1.1 : 0.95;
  utterance.pitch = currentMode === 'hell' ? 0.8 : 1.1;

  // Try to pick a good voice
  const voices = window.speechSynthesis.getVoices();
  const langCode = currentLang === 'he' ? 'he' : 'en';
  const voice = voices.find(v => v.lang.startsWith(langCode));
  if (voice) utterance.voice = voice;

  utterance.onend = () => {
    isSpeakingNow = false;
    processQueue();
  };
  utterance.onerror = () => {
    isSpeakingNow = false;
    processQueue();
  };

  currentUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

// =========== MIC / SPEECH RECOGNITION ===========
function toggleMic() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('הדפדפן לא תומך בזיהוי קול. נסה Chrome.');
    return;
  }

  // Stop any speech while user is talking
  window.speechSynthesis.cancel();
  isSpeakingNow = false;
  speakQueue.length = 0;

  recognition = new SpeechRecognition();
  recognition.lang = currentLang === 'he' ? 'he-IL' : 'en-US';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '⏹';
    setStatus('מאזין...');
  };

  recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t;
      else interim += t;
    }

    const display = final || interim;
    document.getElementById('transcript-indicator').textContent = display ? `🎤 ${display}` : '';
    if (final) {
      document.getElementById('chat-text').value = final;
    }
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-btn').textContent = '🎤';

    const text = document.getElementById('chat-text').value.trim();
    if (text) {
      setTimeout(() => {
        sendMessage(text);
        document.getElementById('chat-text').value = '';
        document.getElementById('transcript-indicator').textContent = '';
      }, 300);
    } else {
      document.getElementById('transcript-indicator').textContent = '';
      setStatus('מוכן לפקודות');
    }
  };

  recognition.onerror = (e) => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-btn').textContent = '🎤';
    setStatus('שגיאת מיקרופון: ' + e.error);
  };

  recognition.start();
}

function stopRecording() {
  if (recognition) recognition.stop();
}

// =========== UI HELPERS ===========
function setStatus(text) {
  document.getElementById('chat-status').textContent = text;
}

function setWaveform(active) {
  const wf = document.getElementById('waveform');
  if (active) wf.parentElement.parentElement.classList.add('speaking');
  else wf.parentElement.parentElement.classList.remove('speaking');
}

// Load voices on startup
window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
